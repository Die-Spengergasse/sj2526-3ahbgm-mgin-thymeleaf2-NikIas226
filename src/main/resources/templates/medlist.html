<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Medication List</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <style>
        .table th, .table td {
            text-align: center;
        }
        .table th {
            background-color: #f2f2f2;
        }
        .table tr
        {
            background-color: #ffffff;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Medication List</h2>
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Name</th>
            <th>Dosage</th>
            <th>Expiration Date</th>

        </tr>
        </thead>
        <tbody>
        <tr th:each="m : ${medications}">
            <td th:text="${m.name}"></td>
            <td th:text="${m.dosage}"></td>
            <td th:text="${m.expirationDate}"></td>
            <td>
                <a th:href="@{/medication/edit/{id}(id=${m.id})}" class="btn btn-sm btn-warning">Edit</a>

                <form th:action="@{/medication/delete/{id}(id=${m.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/medication/add" class="btn btn-primary">New Medication</a>
</div>
</body>
</html>
